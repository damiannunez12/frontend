
<!DOCTYPE html>
<html lang="es-PY">
    <head>
        <title>Primer ejercicio de javaScript</title>
        <meta charset="UTF-8">
    
    </head>
    <body>
        <h3>Tabla de multiplicar</h3>
        <input type="number" id="numero"/>
        <button id="btn-generar">Generar tabla</button>
        <hr>
        <div id="tabla"></div>
    </body>
    <script>
        let numTexto= document.getElementById("numero");
        let btn = document.getElementById("btn_generar");

        btn.addEventListener('clik',function(){
            let num =parseFloat(numTexto.value);
            let tabla =document.getElementById('tabla');
            tabla.innerHTML ="";

            for(let x = 1 ; x <= 10 ; x++){
                tabla.innerHTML += `${num} x ${x} = ${num * x}<br> `

            };
        });

    </script>
</html>
