<script>
class Calculadora{
    #num1;#num2;#resultado;
    constructor(){
      this.#num1 =0;
      this.#num2 =0;
      this.#resultado =0;
    } 
    cargarNumero(x,y){
        this.#num1 = x;
        this.#num2 = y;
    }
    sumar(){
        this.#resultado = this.#num1 + this.#num2;
        return this.#resultado;
    }
    restar(){
        this.#resultado = this.#num1 - this.#num2;
        return this.#resultado;
    }
    multiplicar(){
        this.#resultado = this.#num1 * this.#num2;
        return this.#resultado;
    }
    dividir(){
        this.#resultado = this.#num1 / this.#num2;
        return this.#resultado;
    }
}
</script>
<h1>Calculadora CASIO</h1>
<script>
    casio = new Calculadora();
    casio.cargarNumero(45,7);
    document.write("<br>La suma es: " + casio.sumar());
    casio.cargarNumero(4,6);
    document.write("<br>La resta es: " + casio.restar());
    casio.cargarNumero(8,5);
    document.write("<br>La multiplicación es: " + casio.multiplicar());
    casio.cargarNumero(10,2);
    document.write("<br>La división es: " + casio.dividir());

</script>
