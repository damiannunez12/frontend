        <script>
       let num1= 10;
       let num2= 5;
       let operacion=" + ";
       let resultado  ;

       if (operacion == "+"){
        resultado =num1 + num2;

       }else if(operacion == "-"){
       resultado=num1 - num2

       }else if(operacion == "*"){
        resultado=num1 * num2

       }else if(operacion == "/"){
       resultado=num1 / num2
       }

       document.write("Resultado" + resultado)
       console.log("Resultado:" + resultado)
        </script>
