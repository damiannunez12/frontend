<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevShop PY - Tu Tienda Online</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para iconos modernos -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- NAVBAR -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <span class="p-2 bg-emerald-600 text-white rounded-lg">
                        <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                    </span>
                    <span class="text-xl font-bold tracking-tight text-gray-900">Dev<span class="text-emerald-600">Shop PY</span></span>
                </div>

                <!-- Barra de búsqueda rápida (Estética) -->
                <div class="hidden md:flex flex-1 max-w-md mx-8">
                    <div class="relative w-full">
                        <input type="text" placeholder="Buscar productos..." class="w-full bg-gray-100 text-sm text-gray-800 rounded-full pl-10 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                        <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-3.5 top-3"></i>
                    </div>
                </div>

                <!-- Botón Carrito -->
                <button id="cart-toggle-btn" class="relative p-2 text-gray-600 hover:text-emerald-600 transition-colors focus:outline-none">
                    <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                    <span id="cart-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Catálogo de Productos</h1>
            <p class="text-gray-500 mt-2">Explora nuestra selección de productos con precios convertidos a Guaraníes.</p>
        </div>

        <!-- Grid de Productos -->
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Skeleton Loaders -->
            <div class="animate-pulse bg-white border border-gray-100 rounded-2xl p-4 space-y-4">
                <div class="bg-gray-200 h-48 w-full rounded-xl"></div>
                <div class="h-4 bg-gray-200 rounded w-2/3"></div>
                <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                <div class="h-10 bg-gray-200 rounded w-full"></div>
            </div>
            <div class="animate-pulse bg-white border border-gray-100 rounded-2xl p-4 space-y-4">
                <div class="bg-gray-200 h-48 w-full rounded-xl"></div>
                <div class="h-4 bg-gray-200 rounded w-2/3"></div>
                <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                <div class="h-10 bg-gray-200 rounded w-full"></div>
            </div>
            <div class="animate-pulse bg-white border border-gray-100 rounded-2xl p-4 space-y-4">
                <div class="bg-gray-200 h-48 w-full rounded-xl"></div>
                <div class="h-4 bg-gray-200 rounded w-2/3"></div>
                <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                <div class="h-10 bg-gray-200 rounded w-full"></div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-t border-gray-200 py-6 text-center text-sm text-gray-500">
        <p>&copy; 2026 DevShop PY. Todos los derechos reservados.</p>
    </footer>

    <!-- SIDEBAR DEL CARRITO -->
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <!-- Header Carrito -->
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">
            <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                <i data-lucide="shopping-cart" class="text-emerald-600"></i> Mi Carrito
            </h2>
            <button id="cart-close-btn" class="p-2 text-gray-400 hover:text-gray-600 transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- Items del Carrito -->
        <div id="cart-items-container" class="flex-1 overflow-y-auto p-6 space-y-4">
            <!-- Mensaje vacío por defecto -->
            <div id="cart-empty-state" class="flex flex-col items-center justify-center h-full text-gray-400 space-y-2">
                <i data-lucide="shopping-bag" class="w-12 h-12"></i>
                <p class="text-sm">Tu carrito está vacío</p>
            </div>
        </div>

        <!-- Resumen de Compra -->
        <div class="p-6 border-t border-gray-100 bg-gray-50 space-y-4">
            <div class="flex justify-between items-center text-sm">
                <span class="text-gray-500">Subtotal</span>
                <span id="cart-subtotal" class="font-medium text-gray-900">0 Gs.</span>
            </div>
            <div class="flex justify-between items-center text-base font-bold text-gray-900">
                <span>Total</span>
                <span id="cart-total" class="text-lg text-emerald-600">0 Gs.</span>
            </div>
            <button class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-emerald-100 transition-all flex justify-center items-center gap-2">
                Proceder al pago <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <!-- Overlay de Fondo al abrir carrito -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/40 z-40 hidden transition-opacity duration-300"></div>

    <!-- LÓGICA JAVASCRIPT -->
    <script>
        // --- Constantes de conversión ---
        const TASA_CAMBIO = 7800; // 1 USD = 7.800 Gs.

        // --- Variables de Estado ---
        let products = [];
        let cart = [];

        // --- Selectores DOM ---
        const productsGrid = document.getElementById('products-grid');
        const cartSidebar = document.getElementById('cart-sidebar');
        const cartOverlay = document.getElementById('cart-overlay');
        const cartToggleBtn = document.getElementById('cart-toggle-btn');
        const cartCloseBtn = document.getElementById('cart-close-btn');
        const cartItemsContainer = document.getElementById('cart-items-container');
        const cartEmptyState = document.getElementById('cart-empty-state');
        const cartBadge = document.getElementById('cart-badge');
        const cartSubtotal = document.getElementById('cart-subtotal');
        const cartTotal = document.getElementById('cart-total');

        // --- Inicialización de iconos Lucide ---
        function initIcons() {
            lucide.createIcons();
        }

        // --- Formateador de moneda (Guaraní Paraguayo - PYG) ---
        function formatGS(value) {
            return new Intl.NumberFormat('es-PY', {
                style: 'currency',
                currency: 'PYG',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        }

        // --- Consumir API de Productos ---
        async function fetchProducts() {
            try {
                const response = await fetch('https://fakestoreapi.com/products');
                const rawProducts = await response.json();
                
                // Mapeamos los productos para convertir sus precios a Guaraníes de antemano
                products = rawProducts.map(product => ({
                    ...product,
                    precioGs: Math.round(product.price * TASA_CAMBIO)
                }));

                renderProducts(products);
            } catch (error) {
                console.error("Error cargando productos:", error);
                productsGrid.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <p class="text-red-500 font-medium">Ocurrió un error al cargar los productos. Por favor intenta de nuevo.</p>
                    </div>
                `;
            }
        }

        // --- Renderizar Catálogo ---
        function renderProducts(items) {
            productsGrid.innerHTML = '';
            items.forEach(product => {
                const card = document.createElement('div');
                card.className = "bg-white border border-gray-100 rounded-2xl p-5 flex flex-col justify-between hover:shadow-xl transition-all duration-300 group";
                card.innerHTML = `
                    <div>
                        <!-- Imagen Contenedora -->
                        <div class="w-full h-48 flex items-center justify-center overflow-hidden rounded-xl bg-gray-50 p-4 mb-4 relative">
                            <img src="${product.image}" alt="${product.title}" class="max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-300 animate-fade-in">
                            <span class="absolute top-2 left-2 bg-gray-100 text-gray-800 text-xs font-semibold px-2.5 py-0.5 rounded-full capitalize">
                                ${product.category}
                            </span>
                        </div>
                        <!-- Detalles -->
                        <h3 class="text-sm font-semibold text-gray-800 line-clamp-2 hover:text-emerald-600 cursor-pointer min-h-[40px]" title="${product.title}">
                            ${product.title}
                        </h3>
                        <div class="flex items-center gap-1 mt-2">
                            <i data-lucide="star" class="w-4 h-4 text-amber-400 fill-amber-400"></i>
                            <span class="text-xs font-medium text-gray-500">${product.rating?.rate || '4.5'} (${product.rating?.count || '120'})</span>
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <!-- Precio en Gs. -->
                        <div class="text-lg font-extrabold text-gray-950 mb-4">
                            ${formatGS(product.precioGs)}
                        </div>
                        <!-- Botonera -->
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="verDetalle(${product.id})" class="px-3 py-2 text-xs font-medium text-emerald-700 bg-emerald-50 hover:bg-emerald-100 rounded-lg transition-colors">
                                Ver Detalle
                            </button>
                            <button onclick="addToCart(${product.id})" class="flex items-center justify-center gap-1 px-3 py-2 text-xs font-medium text-white bg-emerald-600 hover:bg-emerald-700 rounded-lg transition-all shadow-md shadow-emerald-100">
                                <i data-lucide="shopping-cart" class="w-3.5 h-3.5"></i> Agregar
                            </button>
                        </div>
                    </div>
                `;
                productsGrid.appendChild(card);
            });
            initIcons();
        }

        // --- Gestión de Carrito ---

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCartUI();
            openCart();
        }

        function changeQuantity(productId, amount) {
            const item = cart.find(item => item.id === productId);
            if (!item) return;

            item.quantity += amount;

            if (item.quantity <= 0) {
                removeFromCart(productId);
            } else {
                updateCartUI();
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }

        function updateCartUI() {
            // Actualizar Badge
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (totalCount > 0) {
                cartBadge.innerText = totalCount;
                cartBadge.classList.remove('hidden');
                cartEmptyState.classList.add('hidden');
            } else {
                cartBadge.classList.add('hidden');
                cartEmptyState.classList.remove('hidden');
            }

            // Limpiar items anteriores del DOM (excepto el empty state)
            const nonStateItems = cartItemsContainer.querySelectorAll('.cart-item-row');
            nonStateItems.forEach(el => el.remove());

            // Renderizar items actuales
            cart.forEach(item => {
                const row = document.createElement('div');
                row.className = "cart-item-row flex items-center justify-between gap-4 p-3 bg-gray-50 rounded-xl border border-gray-100";
                row.innerHTML = `
                    <img src="${item.image}" alt="${item.title}" class="w-12 h-12 object-contain bg-white rounded-lg p-1 flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <h4 class="text-xs font-semibold text-gray-800 truncate">${item.title}</h4>
                        <span class="text-xs text-emerald-600 font-bold">${formatGS(item.precioGs)}</span>
                    </div>
                    <!-- Controles Cantidad -->
                    <div class="flex items-center gap-2">
                        <button onclick="changeQuantity(${item.id}, -1)" class="w-6 h-6 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors">
                            -
                        </button>
                        <span class="text-xs font-bold w-4 text-center">${item.quantity}</span>
                        <button onclick="changeQuantity(${item.id}, 1)" class="w-6 h-6 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors">
                            +
                        </button>
                    </div>
                    <!-- Eliminar -->
                    <button onclick="removeFromCart(${item.id})" class="text-gray-400 hover:text-red-500 transition-colors p-1">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                cartItemsContainer.appendChild(row);
            });

            // Calcular y formatear Totales en Gs.
            const totalSum = cart.reduce((sum, item) => sum + (item.precioGs * item.quantity), 0);
            cartSubtotal.innerText = formatGS(totalSum);
            cartTotal.innerText = formatGS(totalSum);

            initIcons();
        }

        // --- Controladores de Interfaz (Sidebar) ---
        function openCart() {
            cartSidebar.classList.remove('translate-x-full');
            cartOverlay.classList.remove('hidden');
        }

        function closeCart() {
            cartSidebar.classList.add('translate-x-full');
            cartOverlay.classList.add('hidden');
        }

        function verDetalle(id) {
            const item = products.find(p => p.id === id);
            alert(`🔍 Detalle del Producto:\n\n${item.title}\n\nDescripción: ${item.description}\n\nPrecio: ${formatGS(item.precioGs)}`);
        }

        // --- Event Listeners ---
        cartToggleBtn.addEventListener('click', openCart);
        cartCloseBtn.addEventListener('click', closeCart);
        cartOverlay.addEventListener('click', closeCart);

        // --- Carga Inicial ---
        window.addEventListener('DOMContentLoaded', () => {
            fetchProducts();
            initIcons();
        });
    </script>
</body>
</html>
