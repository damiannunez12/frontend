<!DOCTYPE html>
<html lang="es-Py">
<head>
    <meta charset="UTF-8">
    <title>PDF con jsPDF funcionando</title>
    
    <!-- 1. jQuery -->
    <script src="https://jquery.com" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    
    <!-- 2. Versión moderna de jsPDF -->
    <script src="https://cloudflare.com"></script>
    
    <!-- 3. Dependencia obligatoria cargada correctamente -->
    <script src="https://cloudflare.com"></script>
</head>
<body style="background: #f0f0f0; padding: 20px;">

    <!-- Contenedor con estilos básicos para el renderizado -->
    <div id="content" style="padding: 30px; background: white; width: 600px; margin-bottom: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
        <h2 style="color: #333;">Documento PDF Correcto</h2>
        <p style="color: #666;">Quiero guardar en el PDF.</p>
    </div>
    
    <!-- Botón disparador -->
    <button id="btnDescargar" style="padding: 10px 20px; cursor: pointer;">Descargar PDF</button>

    <script>
        $(document).ready(function() {
            $('#btnDescargar').click(function() {
                
                // Configurar las variables globales que exige jsPDF de forma estricta
                window.jsPDF = window.jspdf.jsPDF;
                window.html2canvas = html2canvas; 
                
                // Crear la instancia del documento
                var doc = new jsPDF('p', 'pt', 'a4'); // 'pt' (puntos) da mejor precisión para HTML
                
                // CORRECCIÓN CRÍTICA: Extraer el elemento HTML nativo usando [0]
                var elementoHTML = $('#content')[0]; 

                // Ejecutar la formulación del PDF
                doc.html(elementoHTML, {
                    callback: function (doc) {
                        doc.save('documento.pdf');
                    },
                    x: 20,
                    y: 20,
                    width: 550, // Ancho adaptado a la hoja A4 en puntos
                    windowWidth: 600 // Forzar a que renderice con el mismo ancho del div
                });
                
            });
        });
    </script>
</body>
</html>
